<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>TikTok OAuth Callback</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; padding: 24px; }
    code { background:#f3f3f3; padding:2px 6px; border-radius:6px; }
    .box { margin-top: 12px; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
    input { width: 100%; padding: 10px; font-size: 14px; }
    button { margin-top: 8px; padding: 8px 12px; }
  </style>
</head>
<body>
  <h1>Callback received</h1>
  <p>If you see a <code>code</code> below, copy it and use it to exchange for an access token.</p>

  <div class="box">
    <div><strong>code</strong>:</div>
    <input id="code" readonly />
    <button onclick="copyCode()">Copy code</button>
  </div>

  <div class="box">
    <div><strong>Full URL</strong>:</div>
    <div id="full"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "";
    document.getElementById("code").value = code;
    document.getElementById("full").textContent = window.location.href;

    function copyCode(){
      const el = document.getElementById("code");
      el.select(); el.setSelectionRange(0, 99999);
      document.execCommand("copy");
    }
  </script>
</body>
</html>
